<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Form | SubTrack</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar(${activePage})}"></aside>

    <main class="content-area">
        <header th:replace="~{fragments/header :: header(${pageTitle})}"></header>

        <section class="page-content">
            <article class="card form-card">
                <h2 th:text="${pageTitle}">Add Subscription</h2>
                <p>Use this form to create or update a service subscription.</p>

                <form class="form-grid"
                      th:action="${subscription.id == null} ? @{/subscriptions} : @{'/subscriptions/' + ${subscription.id} + '/update'}"
                      method="post"
                      th:object="${subscription}">
                    <label>
                        Service Name
                        <input type="text" th:field="*{serviceName}" required>
                    </label>

                    <label>
                        Category
                        <input type="text" th:field="*{category}" placeholder="Productivity, Entertainment...">
                    </label>

                    <label>
                        Price
                        <input type="number" step="0.01" min="0" th:field="*{price}" required>
                    </label>

                    <label>
                        Billing Cycle
                        <select th:field="*{billingCycle}">
                            <option th:each="cycle : ${billingCycles}" th:value="${cycle}" th:text="${cycle}"></option>
                        </select>
                    </label>

                    <label>
                        Next Renewal Date
                        <input type="date" th:field="*{nextRenewalDate}">
                    </label>

                    <label>
                        Status
                        <select th:field="*{status}">
                            <option th:each="statusItem : ${statuses}" th:value="${statusItem}" th:text="${statusItem}"></option>
                        </select>
                    </label>

                    <label class="span-2">
                        Notes / Description
                        <textarea rows="4" th:field="*{description}" placeholder="Optional note"></textarea>
                    </label>

                    <div class="form-actions span-2">
                        <button class="btn btn-gradient" type="submit">Save Subscription</button>
                        <a class="btn btn-outline" th:href="@{/subscriptions}">Cancel</a>
                    </div>
                </form>
            </article>
        </section>
    </main>
</div>
</body>
</html>
