<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Detail | SubTrack</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar(${activePage})}"></aside>

    <main class="content-area">
        <header th:replace="~{fragments/header :: header(${pageTitle})}"></header>

        <section class="page-content">
            <article class="card detail-card">
                <div class="card-head card-head--row">
                    <h2 th:text="${subscription.serviceName}">Netflix</h2>
                    <a class="btn btn-outline" th:href="@{'/subscriptions/' + ${subscription.id} + '/edit'}">Edit</a>
                </div>

                <div class="detail-grid">
                    <div>
                        <p class="detail-label">Category</p>
                        <p th:text="${subscription.category}">Entertainment</p>
                    </div>
                    <div>
                        <p class="detail-label">Price</p>
                        <p th:text="'$' + ${#numbers.formatDecimal(subscription.priceAmount,1,2)}">$15.49</p>
                    </div>
                    <div>
                        <p class="detail-label">Billing Cycle</p>
                        <p th:text="${subscription.billingCycle}">MONTHLY</p>
                    </div>
                    <div>
                        <p class="detail-label">Next Renewal</p>
                        <p th:text="${subscription.nextRenewalDate != null ? #temporals.format(subscription.nextRenewalDate,'MMM d, yyyy') : '-'}">May 30, 2025</p>
                    </div>
                    <div>
                        <p class="detail-label">Status</p>
                        <p th:text="${subscription.status}">ACTIVE</p>
                    </div>
                    <div>
                        <p class="detail-label">Description</p>
                        <p th:text="${subscription.description}">Streaming service</p>
                    </div>
                </div>

                <div class="form-actions">
                    <a class="btn btn-gradient" th:href="@{/subscriptions}">Back to Subscriptions</a>
                    <form th:action="@{'/subscriptions/' + ${subscription.id} + '/delete'}" method="post">
                        <button type="submit" class="btn btn-outline btn-danger">Delete Subscription</button>
                    </form>
                </div>
            </article>
        </section>
    </main>
</div>
</body>
</html>
