<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reminders | SubTrack</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-shell">
    <aside th:replace="~{fragments/sidebar :: sidebar(${activePage})}"></aside>

    <main class="content-area">
        <header th:replace="~{fragments/header :: header(${pageTitle})}"></header>

        <section class="page-content">
            <article class="card renewal-card">
                <div class="card-head card-head--row">
                    <div>
                        <h2>Renewal Reminders</h2>
                        <p>Notifications for upcoming subscription charges.</p>
                    </div>
                    <button class="btn btn-gradient" type="button">Create Reminder</button>
                </div>

                <ul class="renewal-list">
                    <li th:each="reminder : ${upcomingRenewals}">
                        <div>
                            <p class="renewal-service" th:text="${reminder.serviceName}">Netflix</p>
                            <p class="renewal-date" th:text="${#temporals.format(reminder.renewalDate,'MMM d, yyyy')}">May 30, 2025</p>
                        </div>
                        <div class="renewal-meta">
                            <span class="renewal-price" th:text="'$' + ${#numbers.formatDecimal(reminder.price,1,2)}">$15.49</span>
                            <span class="renewal-badge" th:text="'in ' + ${reminder.daysLeft} + ' days'">in 5 days</span>
                        </div>
                    </li>
                </ul>
            </article>
        </section>
    </main>
</div>
</body>
</html>
